name: Deploy to GitHub Pages(TanStack Playground)

on:
  push:
    branches:
      - main
    paths:
      - apps/tanstack-playground/**
      - .github/workflows/tanstack-playground.yaml

jobs:
  deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm --filter tanstack-playground install

      - name: Build SPA
        env:
          BASE_PATH: /showroom/tanstack-playground/
        run: pnpm run tanstack:build

      - name: Deployment
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/tanstack-playground/.output/public
          destination_dir: tanstack-playground
