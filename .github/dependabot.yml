# Grouped weekly updates.
# Groups bundle non-major bumps into one PR per ecosystem/dependency-type;
# major bumps still get their own PR so breaking changes can be reviewed in isolation.

version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    # Only propose versions that have aged past pnpm 11's default
    # minimumReleaseAge (24h supply-chain policy). A few days of margin keeps
    # the lockfile from ever carrying a too-fresh package that would fail
    # `pnpm install` in CI; majors soak longer to surface breakage first.
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      dev-dependencies:
        dependency-type: 'development'
      production-dependencies:
        dependency-type: 'production'
